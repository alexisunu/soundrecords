
<div class="app-auth">
  <div class="auth-box">

    <div class="auth-logo">
      <div class="auth-logo-mark"></div>
      <div class="auth-logo-text">SOUND<span>RECORDS</span></div>
    </div>

    <div class="auth-title">Bienvenido de vuelta</div>
    <div class="auth-sub">Ingresa a tu cuenta para continuar</div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmitLogin()">
      <div class="field" [class.invalid]="loginEmail?.invalid && loginEmail?.touched">
        <label for="login-email">Correo electrónico</label>
        <input id="login-email" type="email" placeholder="tu@correo.com" formControlName="email" />
        <div class="hint error" *ngIf="loginEmail?.invalid && loginEmail?.touched">
          Ingresa un correo electrónico válido
        </div>
      </div>

      <div class="field" [class.invalid]="loginPassword?.invalid && loginPassword?.touched">
        <label for="login-password">Contraseña</label>
        <input id="login-password" type="password" placeholder="••••••••" formControlName="password" />
        <div class="hint error" *ngIf="loginPassword?.invalid && loginPassword?.touched">
          La contraseña debe tener mínimo 8 caracteres
        </div>
        <div class="hint" *ngIf="loginPassword?.valid || !loginPassword?.touched">
          <a href="javascript:void(0)" class="hint-link">¿Olvidaste tu contraseña?</a>
        </div>
      </div>

      <div class="hint error general-error" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit" class="btn-primary btn-block" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Iniciar sesión' }}
      </button>
    </form>

    <div class="auth-footer">
      ¿No tienes cuenta?
      <a routerLink="/register">Regístrate gratis</a>
    </div>
  </div>
</div>
