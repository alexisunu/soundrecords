<!--
  Sidebar global de la app (VISTA 1 del mockup MU_1.html).
  Se monta una sola vez dentro de app-main-layout, junto al <router-outlet>
  de las vistas protegidas (feed, my-profile, settings, etc.).
-->
<aside class="sidebar">
  <div class="logo" routerLink="/listener/feed">
    <div class="logo-mark"></div>
    <div class="logo-text">SOUND<span>RECORDS</span></div>
  </div>

  <nav>
    <div class="nav-group">
      <a class="nav-item" routerLink="/listener/feed" routerLinkActive="active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
        </svg>
        Inicio
      </a>

      <a class="nav-item" routerLink="/listener/album-search" routerLinkActive="active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7" />
          <path d="M21 21l-4.3-4.3" />
        </svg>
        Buscar álbumes
      </a>

      <a class="nav-item" routerLink="/listener/explore" routerLinkActive="active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 11l18-7-7 18-2-8-9-3z" />
        </svg>
        Explorar
      </a>
    </div>

    <div class="nav-group">
      <div class="nav-label">Tu cuenta</div>

      <a class="nav-item" routerLink="/listener/my-profile" routerLinkActive="active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4" />
          <path d="M4 21c0-4 3.5-7 8-7s8 3 8 7" />
        </svg>
        Mi perfil
      </a>

      <a class="nav-item" routerLink="/listener/collections" routerLinkActive="active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="7" height="7" rx="1.5" />
          <rect x="14" y="4" width="7" height="7" rx="1.5" />
          <rect x="3" y="15" width="7" height="6" rx="1.5" />
          <rect x="14" y="15" width="7" height="6" rx="1.5" />
        </svg>
        Mis listas
      </a>
    </div>

    <div class="nav-group">
      <div class="nav-label">Comunidad</div>

      <a class="nav-item is-disabled" title="Próximamente">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2l2.7 6.6L22 9l-5 4.6L18.5 22 12 17.8 5.5 22 7 13.6 2 9l7.3-.4z" />
        </svg>
        Misiones
      </a>

      <a class="nav-item is-disabled" title="Próximamente">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="9" />
          <circle cx="12" cy="12" r="2.4" />
        </svg>
        Artistas emergentes
      </a>
    </div>
  </nav>

  <div class="sidebar-bottom" *ngIf="user$ | async as user">
    <a class="user-chip" routerLink="/settings" title="Ir a configuración">
      <div class="avatar-sm" [style.background-image]="user.photoUrl ? 'url(' + user.photoUrl + ')' : null"></div>
      <div>
        <div class="uname">{{ user.username }}</div>
        <div class="ulevel">Nivel {{ user.level }} · {{ user.points | number }} pts</div>
      </div>
    </a>
    <button class="logout-btn" type="button" title="Cerrar sesión" (click)="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
        <path d="M16 17l5-5-5-5" />
        <path d="M21 12H9" />
      </svg>
    </button>
  </div>
</aside>
